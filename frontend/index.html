    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Skolar",
      "url": "https://skolar.in",
      "description": "AI-powered CBSE worksheet generator for Classes 1-5. 198 topics across 9 subjects — Mathematics, English, Hindi, EVS, Science, Computer, GK, Moral Science, Health & PE — with three difficulty tiers and print-ready PDF download.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": [
        {"@type": "Offer", "price": "0", "priceCurrency": "INR", "description": "Free plan — 5 worksheets per month"},
        {"@type": "Offer", "price": "199", "priceCurrency": "INR", "description": "Scholar plan — unlimited worksheets per month"},
        {"@type": "Offer", "price": "1499", "priceCurrency": "INR", "description": "Annual plan — unlimited worksheets, save 37%"}
      ],
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "typicalAgeRange": "6-11"
      },
      "featureList": [
        "AI-generated CBSE worksheets",
        "198 topics across 9 subjects",
        "Three difficulty tiers: Foundation, Application, Stretch",
        "Print-ready PDF with answer key",
        "Indian context word problems",
        "Hindi Devanagari support",

        "Bulk generation for teachers"
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Skolar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Skolar is an AI-powered worksheet generator designed for Indian school children studying the CBSE curriculum in Classes 1 through 5. It creates practice worksheets across 9 subjects with three difficulty tiers."
          }
        },
        {
          "@type": "Question",
          "name": "What subjects does Skolar cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Skolar covers 9 subjects: Mathematics, English, Hindi, EVS/Science, Computer, General Knowledge, Moral Science, Health & Physical Education. There are 198 topics available across Classes 1-5."
          }
        },
        {
          "@type": "Question",
          "name": "How does Skolar generate worksheets?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pick a topic from the CBSE syllabus, choose a difficulty tier (Foundation, Application, or Stretch), and Skolar's AI generates 10 questions instantly. Download as a print-ready PDF with a separate answer key."
          }
        },
        {
          "@type": "Question",
          "name": "Is Skolar free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Skolar offers 5 free worksheets per month. For unlimited worksheets, the Scholar plan costs ₹199/month, and the Annual plan costs ₹1,499/year (save 37%)."
          }
        },
        {
          "@type": "Question",
          "name": "What classes does Skolar support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Skolar supports CBSE Classes 1 through 5 (ages 6-11). Topics are aligned with the NCERT curriculum and include age-appropriate questions with Indian context."
          }
        },
        {
          "@type": "Question",
          "name": "Can teachers use Skolar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Skolar has a dedicated teacher mode with bulk worksheet generation, class management, mastery tracking across students, and WhatsApp sharing for easy distribution."
          }
        }
      ]
    }
    </script>
